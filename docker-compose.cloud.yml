# ═══════════════════════════════════════════════════════════════════════
#  AI Datacenter Monitoring — Cloud VM Deployment
#  Deploy on VM4 (192.168.56.104) with: make cloud-up
#
#  Edge VMs (VM1-VM3) connect to Kafka via EXTERNAL listener on :29092
#  Cloud services use internal Docker DNS (kafka:9092)
# ═══════════════════════════════════════════════════════════════════════

services:
  # ════════════════════════════════════════════
  #  EVENT BUS — Kafka with dual listeners
  # ════════════════════════════════════════════

  kafka:
    image: apache/kafka:3.9.0
    container_name: dc-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Dual listeners: INTERNAL for cloud services, EXTERNAL for edge VMs
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${CLOUD_VM_IP}:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "datacenter-kafka-cluster-01"
    ports:
      - "9092:9092"     # internal (optional, for admin tools from host)
      - "29092:29092"   # external — edge VMs connect here
    volumes:
      - kafka-data:/tmp/kafka-logs
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dc-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dc-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: datacenter
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - dc-network

  # ════════════════════════════════════════════
  #  DATA & VISUALIZATION
  # ════════════════════════════════════════════

  influxdb:
    image: influxdb:2.7
    container_name: dc-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: influx ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dc-network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: dc-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/datacenter.json
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/provisioning/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - dc-network

  # ════════════════════════════════════════════
  #  MICROSERVICES
  # ════════════════════════════════════════════

  telemetry-hub:
    build:
      context: ./services/telemetry-hub
    container_name: dc-telemetry-hub
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      PORT: ${TELEMETRY_HUB_PORT}
    ports:
      - "${TELEMETRY_HUB_PORT:-8001}:${TELEMETRY_HUB_PORT:-8001}"
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dc-network

  ai-predictor:
    build:
      context: ./services/ai-predictor
    container_name: dc-ai-predictor
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUX_LOOKBACK_MINUTES: 30
      INFLUX_MIN_HISTORY_POINTS: 10
      PREDICT_COOLDOWN_SECONDS: 15
      PORT: ${AI_PREDICTOR_PORT}
    ports:
      - "${AI_PREDICTOR_PORT:-8002}:${AI_PREDICTOR_PORT:-8002}"
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dc-network

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: dc-api-gateway
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      TELEMETRY_HUB_URL: http://telemetry-hub:${TELEMETRY_HUB_PORT}
      AI_PREDICTOR_URL: http://ai-predictor:${AI_PREDICTOR_PORT}
      PORT: ${API_GATEWAY_PORT}
    ports:
      - "${API_GATEWAY_PORT:-8000}:${API_GATEWAY_PORT:-8000}"
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      telemetry-hub:
        condition: service_started
      ai-predictor:
        condition: service_started
    restart: unless-stopped
    networks:
      - dc-network

volumes:
  kafka-data:
  influxdb-data:

networks:
  dc-network:
    driver: bridge
