! ═══════════════════════════════════════════════════════════
!  VM3 — Leaf Router (frr-leaf-02)
!  AS 65002  |  IP: 192.168.56.103
!  BGP peer: VM1 (spine, AS 65100)
!
!  Copy to /etc/frr/frr.conf on VM3
! ═══════════════════════════════════════════════════════════

frr version 8.5
frr defaults datacenter
hostname frr-leaf-02
log syslog informational
service integrated-vtysh-config

! ─── Interface Configuration ───
interface lo
 ip address 10.0.2.1/32
 description Loopback — Leaf-02

interface enp0s8
 ip address 192.168.56.103/24
 description Host-Only — Management + BGP peering

! ─── BGP Configuration ───
router bgp 65002
 bgp router-id 10.0.2.1
 no bgp ebgp-requires-policy

 ! Peer: VM1 — Spine-01
 neighbor 192.168.56.101 remote-as 65100
 neighbor 192.168.56.101 description frr-spine-01

 address-family ipv4 unicast
  network 10.0.2.1/32
  neighbor 192.168.56.101 activate
 exit-address-family

! ─── Static route for management ───
ip route 0.0.0.0/0 192.168.56.1

line vty
