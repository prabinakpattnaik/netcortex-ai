! ═══════════════════════════════════════════════════════════
!  VM1 — Spine Router (frr-spine-01)
!  AS 65100  |  IP: 192.168.56.101
!  BGP peers: VM2 (leaf, AS 65001), VM3 (leaf, AS 65002)
!
!  Copy to /etc/frr/frr.conf on VM1
! ═══════════════════════════════════════════════════════════

frr version 8.5
frr defaults datacenter
hostname frr-spine-01
log syslog informational
service integrated-vtysh-config

! ─── Interface Configuration ───
interface lo
 ip address 10.0.0.1/32
 description Loopback — Spine-01

interface enp0s8
 ip address 192.168.56.101/24
 description Host-Only — Management + BGP peering

! ─── BGP Configuration ───
router bgp 65100
 bgp router-id 10.0.0.1
 bgp bestpath as-path multipath-relax
 no bgp ebgp-requires-policy

 ! Peer: VM2 — Leaf-01
 neighbor 192.168.56.102 remote-as 65001
 neighbor 192.168.56.102 description frr-leaf-01

 ! Peer: VM3 — Leaf-02
 neighbor 192.168.56.103 remote-as 65002
 neighbor 192.168.56.103 description frr-leaf-02

 address-family ipv4 unicast
  network 10.0.0.1/32
  neighbor 192.168.56.102 activate
  neighbor 192.168.56.103 activate
 exit-address-family

! ─── Static route for management ───
ip route 0.0.0.0/0 192.168.56.1

line vty
